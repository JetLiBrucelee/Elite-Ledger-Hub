openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Elite Ledger Capital API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: plans
    description: Investment plans
  - name: chat
    description: Live chat
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials or account not approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /plans:
    get:
      operationId: getPlans
      tags: [plans]
      summary: Get all investment plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestmentPlan"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a single investment plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentPlan"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get chat messages for the current user or session
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/events:
    get:
      operationId: chatEvents
      tags: [chat]
      summary: SSE stream for real-time chat updates
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/approve:
    post:
      operationId: adminApproveUser
      tags: [admin]
      summary: Approve a pending user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/reject:
    post:
      operationId: adminRejectUser
      tags: [admin]
      summary: Reject a pending user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/chat/sessions:
    get:
      operationId: adminGetChatSessions
      tags: [admin]
      summary: Get all chat sessions (admin)
      responses:
        "200":
          description: List of chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"

  /admin/chat/messages/{sessionId}:
    get:
      operationId: adminGetSessionMessages
      tags: [admin]
      summary: Get messages for a specific chat session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /admin/chat/reply:
    post:
      operationId: adminReplyChat
      tags: [admin]
      summary: Admin replies to a chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReplyRequest"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /user/dashboard:
    get:
      operationId: getUserDashboard
      tags: [users]
      summary: Get user dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboard"

  /user/investments:
    get:
      operationId: getUserInvestments
      tags: [users]
      summary: Get user investments
      responses:
        "200":
          description: User investments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInvestment"

  /user/transactions:
    get:
      operationId: getUserTransactions
      tags: [users]
      summary: Get user transaction history
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        country:
          type: string
      required:
        - firstName
        - lastName
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - email
        - role
        - status
        - createdAt

    InvestmentPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tier:
          type: string
          enum: [bronze, silver, gold, platinum, diamond]
        minInvestment:
          type: number
        returnPercentage:
          type: number
        durationMonths:
          type: integer
        month1Return:
          type: number
        month2Return:
          type: number
        month3Return:
          type: number
        description:
          type: string
        features:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - tier
        - minInvestment
        - returnPercentage
        - durationMonths
        - month1Return
        - month2Return
        - month3Return
        - description
        - features

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        senderType:
          type: string
          enum: [user, admin, visitor]
        senderName:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - senderType
        - senderName
        - message
        - createdAt

    ChatSession:
      type: object
      properties:
        sessionId:
          type: string
        visitorName:
          type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
        status:
          type: string
          enum: [active, closed]
      required:
        - sessionId
        - visitorName
        - lastMessage
        - lastMessageAt
        - unreadCount
        - status

    SendMessageRequest:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
        senderName:
          type: string
      required:
        - message
        - senderName

    AdminReplyRequest:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
      required:
        - sessionId
        - message

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        pendingUsers:
          type: integer
        approvedUsers:
          type: integer
        totalInvestments:
          type: number
        activeChatSessions:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalUsers
        - pendingUsers
        - approvedUsers
        - totalInvestments
        - activeChatSessions
        - totalRevenue

    UserDashboard:
      type: object
      properties:
        totalInvested:
          type: number
        totalReturns:
          type: number
        activeInvestments:
          type: integer
        accountBalance:
          type: number
        portfolioGrowth:
          type: number
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - totalInvested
        - totalReturns
        - activeInvestments
        - accountBalance
        - portfolioGrowth
        - recentTransactions

    UserInvestment:
      type: object
      properties:
        id:
          type: integer
        planName:
          type: string
        planTier:
          type: string
        investedAmount:
          type: number
        currentValue:
          type: number
        returnPercentage:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, completed, cancelled]
      required:
        - id
        - planName
        - planTier
        - investedAmount
        - currentValue
        - returnPercentage
        - startDate
        - endDate
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, profit, bonus]
        amount:
          type: number
        description:
          type: string
        status:
          type: string
          enum: [completed, pending, failed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - description
        - status
        - createdAt
