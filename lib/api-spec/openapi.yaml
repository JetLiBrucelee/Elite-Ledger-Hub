openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Elite Ledger Capital API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: plans
    description: Investment plans
  - name: chat
    description: Live chat
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created (pending approval)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account pending approval or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /plans:
    get:
      operationId: getPlans
      tags: [plans]
      summary: Get all investment plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestmentPlan"

  /plans/{id}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a single investment plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentPlan"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get chat messages for a session
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Missing or invalid sessionId

    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Invalid request body or session ID
        "429":
          description: Rate limit exceeded — too many messages per minute

  /chat/events:
    get:
      operationId: chatEvents
      tags: [chat]
      summary: SSE stream for real-time chat updates
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE event stream

  /applications:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit a job application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitApplicationRequest"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplication"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, blocked]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: adminCreateUser
      tags: [admin]
      summary: Create a new user from admin panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/approve:
    post:
      operationId: adminApproveUser
      tags: [admin]
      summary: Approve a pending user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/reject:
    post:
      operationId: adminRejectUser
      tags: [admin]
      summary: Reject a pending user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/block:
    post:
      operationId: adminBlockUser
      tags: [admin]
      summary: Block an active user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/unblock:
    post:
      operationId: adminUnblockUser
      tags: [admin]
      summary: Unblock a blocked user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/suspend:
    post:
      operationId: adminSuspendUser
      tags: [admin]
      summary: Suspend a user (set status to pending)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/credit:
    post:
      operationId: adminCreditUser
      tags: [admin]
      summary: Credit a user's balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjustRequest"
      responses:
        "200":
          description: Balance credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/debit:
    post:
      operationId: adminDebitUser
      tags: [admin]
      summary: Debit a user's balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjustRequest"
      responses:
        "200":
          description: Balance debited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Insufficient balance or invalid amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    patch:
      operationId: adminEditUser
      tags: [admin]
      summary: Edit a user's details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminEditUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/applications:
    get:
      operationId: adminGetApplications
      tags: [admin]
      summary: Get all job applications
      responses:
        "200":
          description: List of job applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobApplication"

  /admin/applications/{id}/status:
    patch:
      operationId: adminUpdateApplicationStatus
      tags: [admin]
      summary: Update a job application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationStatusRequest"
      responses:
        "200":
          description: Application status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplication"

  /admin/withdrawals:
    get:
      operationId: adminGetWithdrawals
      tags: [admin]
      summary: Get all withdrawal requests (admin)
      responses:
        "200":
          description: List of withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawalRequest"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Approve a withdrawal request (deducts from user balance)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminWithdrawalAction"
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          description: Insufficient balance or already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/withdrawals/{id}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminWithdrawalAction"
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          description: Already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/chat/sessions:
    get:
      operationId: adminGetChatSessions
      tags: [admin]
      summary: Get all chat sessions (admin)
      responses:
        "200":
          description: List of chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"

  /admin/chat/messages/{sessionId}:
    get:
      operationId: adminGetSessionMessages
      tags: [admin]
      summary: Get messages for a specific chat session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /admin/chat/reply:
    post:
      operationId: adminReplyChat
      tags: [admin]
      summary: Admin replies to a chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReplyRequest"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /admin/chat/events:
    get:
      operationId: adminChatEvents
      tags: [admin]
      summary: SSE stream for admin to receive all incoming chat messages in real time
      responses:
        "200":
          description: SSE event stream (admin only; requires active admin session)
        "401":
          description: Not authenticated
        "403":
          description: Admin access required

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /user/profile:
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update current user profile (name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: No valid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/withdrawal-request:
    post:
      operationId: createWithdrawalRequest
      tags: [users]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWithdrawalRequest"
      responses:
        "201":
          description: Withdrawal request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"
        "400":
          description: Invalid amount or insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/withdrawal-requests:
    get:
      operationId: getUserWithdrawalRequests
      tags: [users]
      summary: Get user's withdrawal requests
      responses:
        "200":
          description: List of withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequest"

  /user/dashboard:
    get:
      operationId: getUserDashboard
      tags: [users]
      summary: Get user dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboard"

  /user/investments:
    get:
      operationId: getUserInvestments
      tags: [users]
      summary: Get user investments
      responses:
        "200":
          description: User investments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInvestment"

  /user/transactions:
    get:
      operationId: getUserTransactions
      tags: [users]
      summary: Get user transaction history
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        country:
          type: string
        address:
          type: string
        city:
          type: string
        stateProvince:
          type: string
        zipCode:
          type: string
      required:
        - firstName
        - lastName
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        stateProvince:
          type: ["string", "null"]
        zipCode:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [pending, approved, rejected, blocked]
        balance:
          type: number
        plan:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - email
        - role
        - status
        - balance
        - createdAt

    AdminCreateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
        country:
          type: string
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [pending, approved, rejected, blocked]
        balance:
          type: number
        plan:
          type: string
      required:
        - firstName
        - lastName
        - email
        - password

    AdminEditUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        country:
          type: string
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [pending, approved, rejected, blocked]
        balance:
          type: number
        plan:
          type: string

    BalanceAdjustRequest:
      type: object
      properties:
        amount:
          type: number
      required:
        - amount

    SubmitApplicationRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        position:
          type: string
        message:
          type: string
      required:
        - name
        - email
        - position
        - message

    JobApplication:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        position:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [pending, reviewed, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - position
        - message
        - status
        - createdAt

    UpdateApplicationStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [reviewed, rejected]
      required:
        - status

    InvestmentPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tier:
          type: string
          enum: [bronze, silver, gold, platinum, diamond]
        minInvestment:
          type: number
        returnPercentage:
          type: number
        durationMonths:
          type: integer
        month1Return:
          type: number
        month2Return:
          type: number
        month3Return:
          type: number
        description:
          type: string
        features:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - tier
        - minInvestment
        - returnPercentage
        - durationMonths
        - month1Return
        - month2Return
        - month3Return
        - description
        - features

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        senderType:
          type: string
          enum: [user, admin, visitor]
        senderName:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - senderType
        - senderName
        - message
        - createdAt

    ChatSession:
      type: object
      properties:
        sessionId:
          type: string
        visitorName:
          type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
        status:
          type: string
          enum: [active, closed]
      required:
        - sessionId
        - visitorName
        - lastMessage
        - lastMessageAt
        - unreadCount
        - status

    SendMessageRequest:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
        senderName:
          type: string
      required:
        - message
        - senderName

    AdminReplyRequest:
      type: object
      properties:
        sessionId:
          type: string
        message:
          type: string
      required:
        - sessionId
        - message

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        pendingUsers:
          type: integer
        approvedUsers:
          type: integer
        totalInvestments:
          type: number
        activeChatSessions:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalUsers
        - pendingUsers
        - approvedUsers
        - totalInvestments
        - activeChatSessions
        - totalRevenue

    UserDashboard:
      type: object
      properties:
        totalInvested:
          type: number
        totalReturns:
          type: number
        activeInvestments:
          type: integer
        accountBalance:
          type: number
        portfolioGrowth:
          type: number
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - totalInvested
        - totalReturns
        - activeInvestments
        - accountBalance
        - portfolioGrowth
        - recentTransactions

    UserInvestment:
      type: object
      properties:
        id:
          type: integer
        planName:
          type: string
        planTier:
          type: string
        investedAmount:
          type: number
        currentValue:
          type: number
        returnPercentage:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, completed, cancelled]
      required:
        - id
        - planName
        - planTier
        - investedAmount
        - currentValue
        - returnPercentage
        - startDate
        - endDate
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, profit, bonus]
        amount:
          type: number
