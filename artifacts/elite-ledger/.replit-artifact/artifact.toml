kind = "web"
previewPath = "/"
title = "Elite Ledger Capital"
version = "1.0.0"
id = "artifacts/elite-ledger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20019
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/elite-ledger run dev"

[services.env]
PORT = "20019"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/elite-ledger", "run", "build"]
publicDir = "artifacts/elite-ledger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
